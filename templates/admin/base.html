<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} - Shafi's Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.1/css/all.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="d-flex" style="min-height:100vh">
        <!-- SIDEBAR -->
        <div class="admin-sidebar bg-dark text-white p-3" style="width:250px;flex-shrink:0">
            <div class="text-center mb-4 mt-2">
                <h5 class="fw-bold"><span class="text-warning">Shafi's</span> Admin</h5>
                <small class="text-secondary">{{ user.username }}</small>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item"><a href="/admin" class="nav-link text-white {% if request.path == '/admin' %}active bg-warning text-dark rounded{% endif %}"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a></li>
                <li class="nav-item"><a href="/admin/users" class="nav-link text-white {% if 'users' in request.path %}active bg-warning text-dark rounded{% endif %}"><i class="fas fa-users me-2"></i>Users</a></li>
                <li class="nav-item"><a href="/admin/products" class="nav-link text-white {% if 'products' in request.path %}active bg-warning text-dark rounded{% endif %}"><i class="fas fa-box me-2"></i>Products</a></li>
                <li class="nav-item"><a href="/admin/categories" class="nav-link text-white {% if 'categories' in request.path %}active bg-warning text-dark rounded{% endif %}"><i class="fas fa-tags me-2"></i>Categories</a></li>
                <li class="nav-item"><a href="/admin/platforms" class="nav-link text-white {% if 'platforms' in request.path %}active bg-warning text-dark rounded{% endif %}"><i class="fas fa-shopping-cart me-2"></i>Platforms</a></li>
                <li class="nav-item"><a href="/admin/slides" class="nav-link text-white {% if 'slides' in request.path %}active bg-warning text-dark rounded{% endif %}"><i class="fas fa-images me-2"></i>Hero Slider</a></li>
                <li class="nav-item"><a href="/admin/social-links" class="nav-link text-white {% if 'social-links' in request.path %}active bg-warning text-dark rounded{% endif %}"><i class="fas fa-share-alt me-2"></i>Social Links</a></li>
                <li class="nav-item"><a href="/admin/clicks" class="nav-link text-white {% if 'clicks' in request.path %}active bg-warning text-dark rounded{% endif %}"><i class="fas fa-chart-line me-2"></i>Clicks</a></li>
                <li class="nav-item"><a href="/admin/backup" class="nav-link text-white {% if 'backup' in request.path %}active bg-warning text-dark rounded{% endif %}"><i class="fas fa-database me-2"></i>Backup</a></li>
                <li><hr class="border-secondary"></li>
                <li class="nav-item"><a href="/" class="nav-link text-white"><i class="fas fa-store me-2"></i>View Site</a></li>
                <li class="nav-item"><a href="/auth/logout" class="nav-link text-white"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
            </ul>
        </div>

        <!-- MAIN -->
        <div class="flex-grow-1 p-4 bg-light">
            {% block admin_content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
