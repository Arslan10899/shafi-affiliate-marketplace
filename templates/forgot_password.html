<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Shop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/line-awesome/1.3.0/line-awesome/css/line-awesome.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
    <style>
        body { background: #eaeded; display: flex; align-items: center; min-height: 100vh; }
        .fp-wrap { width: 100%; max-width: 380px; margin: 0 auto; padding: 20px; }
        .fp-card { background: #fff; border: 1px solid #e7e7e7; border-radius: 4px; padding: 24px 26px; }
        .fp-card h4 { font-size: 24px; font-weight: 500; color: #0f1111; }
        .fp-card p { font-size: 14px; color: #565959; }
        .fp-card .form-label { font-size: 13px; font-weight: 600; color: #0f1111; }
        .fp-card .form-control { border: 1px solid #ddd; border-radius: 4px; padding: 8px 12px; font-size: 14px; }
        .fp-card .form-control:focus { border-color: #febd69; box-shadow: 0 0 0 3px rgba(254,189,105,.3); }
        .login-btn { background: #ffd814; border: 1px solid #fcd200; border-radius: 8px; padding: 8px 0; width: 100%; font-size: 14px; color: #0f1111; cursor: pointer; font-weight: 500; }
        .login-btn:hover { background: #f7ca00; }
    </style>

    <meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body>
{% from 'includes/breadcrumb.html' import breadcrumb %}
{{ breadcrumb([{'name': 'Forgot Password', 'url': '#'}]) }}
    <div class="fp-wrap">
        <div class="fp-card">
            <div class="text-center mb-4">
                <a href="/" style="font-size: 22px; font-weight: 700; color: #131921; text-decoration: none;">Shafi's<span style="color: #febd69;"> Shop</span></a>
            </div>
            <h4 class="mb-2">Forgot Password?</h4>
            <p class="mb-4">Enter your email and we'll send you a reset link.</p>
            <div id="message" class="alert d-none"></div>
            <form id="forgotForm">
                <div class="form-group mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="login-btn" id="forgotBtn">
                    <span id="btnText">Send Reset Link</span>
                    <div class="spinner-border spinner-border-sm d-none" id="btnSpinner"></div>
                </button>
            </form>
            <hr style="border-color: #e7e7e7; margin: 20px 0;">
            <div class="text-center" style="font-size: 13px;">
                <a href="/login" style="color: #007185; text-decoration: none;">Back to Sign In</a>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script>
    $('#forgotForm').on('submit', async function(e) {
        e.preventDefault();
        var email = $('#email').val().trim();
        if (!email) return;
        $('#btnText').addClass('d-none');
        $('#btnSpinner').removeClass('d-none');
        $('#forgotBtn').prop('disabled', true);
        try {
            var res = await fetch('/forgot-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: email})
            });
            var data = await res.json();
            $('#message').removeClass('d-none alert-danger').addClass('alert alert-success').text('Password reset link sent to your email!');
        } catch(e) {
            $('#message').removeClass('d-none alert-success').addClass('alert alert-danger').text('Email not found');
        }
        $('#btnText').removeClass('d-none');
        $('#btnSpinner').addClass('d-none');
        $('#forgotBtn').prop('disabled', false);
    });
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</body>
</html>
