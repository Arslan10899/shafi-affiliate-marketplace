{% extends "base.html" %}
{% block title %}Sign In - {{ super() }}{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:40px 20px">
  <div style="width:100%;max-width:400px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:32px">
    <div class="text-center mb-4">
      <a href="/" style="font-size:26px;font-weight:700;color:#0f172a;text-decoration:none">Shafi's<span style="color:#f59e0b"> Shop</span></a>
    </div>
    <h2 style="font-size:22px;font-weight:600;margin-bottom:20px">Welcome back</h2>
    <div id="loginMsg" class="m-alert" style="display:none"></div>
    <form id="loginForm">
      <div class="mb-3">
        <label class="m-label">Username</label>
        <input type="text" id="loginUser" class="m-input" placeholder="Enter username" required>
      </div>
      <div class="mb-3">
        <label class="m-label">Password</label>
        <input type="password" id="loginPass" class="m-input" placeholder="Enter password" required>
      </div>
      <button type="submit" class="m-btn m-btn-primary m-btn-block" style="justify-content:center;padding:12px 0" id="loginBtn">Sign In</button>
    </form>
    <div style="text-align:center;margin-top:16px;font-size:14px;color:#64748b">
      <a href="{{ url_for('forgot_password') }}" style="color:#3b82f6">Forgot password?</a>
    </div>
    <hr style="border:none;border-top:1px solid #e2e8f0;margin:20px 0">
    <div class="text-center" style="font-size:14px;color:#475569">
      New here? <a href="#" onclick="document.getElementById('regModal').style.display='flex';return false" style="color:#3b82f6;font-weight:500">Create an account</a>
    </div>
  </div>
</div>

<div id="regModal" class="m-modal-overlay" style="display:none" onclick="if(event.target==this)this.style.display='none'">
  <div class="m-modal">
    <div class="m-modal-header">
      <span>Create Account</span>
      <button class="m-modal-close" onclick="document.getElementById('regModal').style.display='none'">&times;</button>
    </div>
    <div class="m-modal-body">
      <div id="regMsg" class="m-alert" style="display:none"></div>
      <form id="regForm">
        <div class="mb-3">
          <label class="m-label">Username</label>
          <input type="text" id="regUser" class="m-input" placeholder="Choose a username" required>
        </div>
        <div class="mb-3">
          <label class="m-label">Email</label>
          <input type="email" id="regEmail" class="m-input" placeholder="Enter email" required>
        </div>
        <div class="mb-3">
          <label class="m-label">Password</label>
          <input type="password" id="regPass" class="m-input" placeholder="Min 6 characters" required minlength="6">
        </div>
        <div class="mb-3">
          <label class="m-label">Confirm Password</label>
          <input type="password" id="regConfirm" class="m-input" placeholder="Re-enter password" required>
        </div>
        <button type="submit" class="m-btn m-btn-primary m-btn-block" style="justify-content:center;padding:12px 0" id="regBtn">Create Account</button>
      </form>
    </div>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  fetch('/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username: document.getElementById('loginUser').value, password: document.getElementById('loginPass').value})
  }).then(function(r){return r.json()}).then(function(d) {
    if(d.success) { window.location.href = '/'; }
    else { var m = document.getElementById('loginMsg'); m.style.display='block'; m.className='m-alert m-alert-error'; m.textContent = d.message || 'Invalid credentials'; btn.disabled = false; btn.textContent = 'Sign In'; }
  }).catch(function(){ var m = document.getElementById('loginMsg'); m.style.display='block'; m.className='m-alert m-alert-error'; m.textContent = 'Error'; btn.disabled = false; btn.textContent = 'Sign In'; });
});

document.getElementById('regForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = 'Creating...';
  fetch('/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: document.getElementById('regUser').value,
      email: document.getElementById('regEmail').value,
      password: document.getElementById('regPass').value,
      confirm: document.getElementById('regConfirm').value
    })
  }).then(function(r){return r.json()}).then(function(d) {
    var m = document.getElementById('regMsg'); m.style.display='block';
    if(d.success) { m.className='m-alert m-alert-success'; m.textContent = 'Account created! Signing in...'; setTimeout(function(){ location.reload(); }, 1000); }
    else { m.className='m-alert m-alert-error'; m.textContent = d.message || 'Error'; btn.disabled = false; btn.textContent = 'Create Account'; }
  }).catch(function(){ var m = document.getElementById('regMsg'); m.style.display='block'; m.className='m-alert m-alert-error'; m.textContent = 'Error'; btn.disabled = false; btn.textContent = 'Create Account'; });
});
</script>
{% endblock %}
