{% extends "base.html" %}
{% block title %}Forgot Password - {{ super() }}{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:40px 20px">
  <div style="width:100%;max-width:400px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:32px">
    <div class="text-center mb-4">
      <a href="/" style="font-size:26px;font-weight:700;color:#0f172a;text-decoration:none">Shafi's<span style="color:#f59e0b"> Shop</span></a>
    </div>
    <h2 style="font-size:22px;font-weight:600;margin-bottom:8px">Forgot password?</h2>
    <p style="color:#64748b;font-size:14px;margin-bottom:24px">Enter your email and we'll send you a reset link.</p>
    <div id="fpMsg" class="m-alert" style="display:none"></div>
    <form id="fpForm">
      <div class="mb-3">
        <label class="m-label">Email Address</label>
        <input type="email" id="fpEmail" class="m-input" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="m-btn m-btn-primary m-btn-block" style="justify-content:center;padding:12px 0" id="fpBtn">Send Reset Link</button>
    </form>
    <hr style="border:none;border-top:1px solid #e2e8f0;margin:20px 0">
    <div class="text-center" style="font-size:14px"><a href="{{ url_for('login') }}" style="color:#3b82f6">Back to Sign In</a></div>
  </div>
</div>
<script>
document.getElementById('fpForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = document.getElementById('fpBtn'); btn.disabled = true; btn.textContent = 'Sending...';
  fetch('/forgot-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email: document.getElementById('fpEmail').value}) })
  .then(function(r){return r.json()}).then(function(d) {
    var m = document.getElementById('fpMsg'); m.style.display='block';
    if(d.success) { m.className='m-alert m-alert-success'; m.textContent = d.message || 'Reset link sent!'; btn.textContent = 'Sent'; }
    else { m.className='m-alert m-alert-error'; m.textContent = d.message || 'Email not found'; btn.disabled = false; btn.textContent = 'Send Reset Link'; }
  }).catch(function() { var m = document.getElementById('fpMsg'); m.style.display='block'; m.className='m-alert m-alert-error'; m.textContent = 'Error'; btn.disabled = false; btn.textContent = 'Send Reset Link'; });
});
</script>
{% endblock %}
