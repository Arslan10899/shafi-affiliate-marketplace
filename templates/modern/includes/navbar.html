<header class="m-header">
  <div class="m-header-inner">
    <a href="/" class="m-logo">Shafi's<span> Shop</span></a>
    <form class="m-search" action="{{ url_for('shop') }}" method="GET">
      <input type="text" name="search" placeholder="Search products..." value="{{ request.args.get('search', '') }}">
      <button type="submit"><i class="las la-search"></i></button>
    </form>
    <nav class="m-nav-links">
      {% if session.user_id %}
      <a href="{{ url_for('dashboard') }}" class="m-auth"><i class="las la-user-circle" style="font-size:20px"></i> {{ session.username[:6] }}</a>
      {% else %}
      <a href="{{ url_for('login') }}" class="m-auth"><i class="las la-sign-in-alt" style="font-size:18px"></i> Sign In</a>
      {% endif %}
      <a href="{{ url_for('wishlist') }}"><i class="las la-heart" style="font-size:18px"></i></a>
      <a href="{{ url_for('cart') }}" class="m-cart">
        <i class="las la-shopping-bag"></i>
        <span class="m-cart-count">{{ cart_count }}</span>
      </a>
    </nav>
  </div>
  <div class="m-subnav">
    <a href="/"><i class="las la-home"></i> Home</a>
    <a href="{{ url_for('shop') }}">All Products</a>
    {% for cat in categories[:6] %}
    <a href="{{ url_for('shop', category=cat.id) }}">{{ cat.name }}</a>
    {% endfor %}
    <a href="{{ url_for('about') }}">About</a>
    <a href="{{ url_for('contact') }}">Contact</a>
  </div>
</header>
