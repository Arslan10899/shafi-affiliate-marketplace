<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shafi's Shop{% endblock %} - Shafi's Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/line-awesome/1.3.0/line-awesome/css/line-awesome.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
    {% block extra_css %}{% endblock %}

    <meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body>
    {% include 'includes/navbar.html' %}
    {% block content %}{% endblock %}
    {% include 'includes/footer.html' %}

    <script>
    function showToast(msg, type) {
        type = type || 'success';
        var c = document.getElementById('m-toast-c');
        if (!c) { c = document.createElement('div'); c.id = 'm-toast-c'; c.className = 'm-toast-container'; document.body.appendChild(c); }
        var t = document.createElement('div');
        t.className = 'm-toast m-toast-' + type;
        t.innerHTML = '<i class="las la-' + (type=='success'?'check-circle':type=='error'?'times-circle':'info-circle') + '"></i> ' + msg;
        c.appendChild(t);
        setTimeout(function() { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(function() { t.remove(); }, 300); }, 3000);
    }
    function addToCart(pid) {
        var qty = document.getElementById('qty') ? document.getElementById('qty').value : 1;
        fetch('/cart/add/' + pid, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:'quantity='+qty })
        .then(function(r){return r.json()}).then(function(d){
            if(d.success){ showToast(d.message||'Added to cart!','success'); var b=document.querySelector('.m-cart-count'); if(b&&d.cart_count) b.textContent=d.cart_count; }
            else { showToast(d.message||'Failed','error'); }
        }).catch(function(){ showToast('Error','error'); });
    }
    function buyNow(pid) {
        var qty = document.getElementById('qty') ? document.getElementById('qty').value : 1;
        fetch('/cart/add/' + pid, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:'quantity='+qty })
        .then(function(r){return r.json()}).then(function(d){
            if(d.success) window.location.href='/cart';
            else showToast(d.message||'Failed','error');
        }).catch(function(){ showToast('Error','error'); });
    }
    function toggleWishlist(pid) {
        fetch('/wishlist/add/' + pid, { method:'POST' })
        .then(function(r){return r.json()}).then(function(d){
            if(d.success){ showToast(d.message||'Wishlist updated','info'); location.reload(); }
            else showToast(d.message||'Failed','error');
        }).catch(function(){ showToast('Error','error'); });
    }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
